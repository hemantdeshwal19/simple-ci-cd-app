version: 2.1

jobs:

  test:
    docker:
      - image: cimg/node:20.10

    steps:
      - checkout

      - restore_cache:
          keys:
            - node-cache-{{ checksum "package-lock.json" }}

      - run:
          name: Install Dependencies
          command: npm install

      - save_cache:
          key: node-cache-{{ checksum "package-lock.json" }}
          paths:
            - node_modules

      - run:
          name: Run Tests
          command: npm test

  docker-build:
    machine: true

    steps:
      - checkout

      - run:
          name: Build Docker Image
          command: |
            docker build -t simple-ci-cd-app .

  deploy:
    machine: true

    steps:
      - checkout

      - run:
          name: Push Docker Image
           command: |
               docker login
               docker push image

workflows:
  version: 2

  ci_pipeline:
    jobs:
      - test
      - docker-build:
          requires:
            - test
